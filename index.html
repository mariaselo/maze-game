<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maze Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: #eee; padding: 10px; }
    h1 { margin-bottom: 4px; font-size: 2rem; color: #e94560; letter-spacing: 2px; }
    #levelName { margin-bottom: 8px; font-size: 1rem; color: #aaa; letter-spacing: 1px; }
    #info { display: flex; gap: 14px; margin-bottom: 8px; font-size: 0.9rem; flex-wrap: wrap; justify-content: center; }
    #info span { background: #16213e; padding: 4px 13px; border-radius: 20px; }
    #difficulty { margin-bottom: 8px; font-size: 0.82rem; color: #aaa; text-align: center; }
    canvas { border: 3px solid #e94560; border-radius: 6px; box-shadow: 0 0 30px #e9456055; transition: border-color .5s, box-shadow .5s; }
    #controls { margin-top: 8px; font-size: 0.78rem; color: #555; }
    #keyStatus { margin-bottom: 6px; font-size: 0.88rem; display: none; }
    #overlay { position: fixed; inset: 0; background: rgba(10,10,20,.88); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    #overlay h2 { font-size: 2.8rem; margin-bottom: 8px; }
    #overlay p  { font-size: 1rem; color: #aaa; margin-bottom: 22px; text-align: center; padding: 0 20px; }
    #overlay button { padding: 11px 34px; font-size: 1rem; background: #e94560; color: #fff; border: none; border-radius: 30px; cursor: pointer; letter-spacing: 1px; }
    #overlay button:hover { background: #c73652; }
    #notification { position: fixed; top: 18px; background: #e94560; color: #fff; padding: 9px 22px; border-radius: 20px; font-size: .95rem; font-weight: bold; opacity: 0; transition: opacity .4s; pointer-events: none; z-index: 20; }

    /* ── Ending screen ── */
    #endingScreen {
      position: fixed; inset: 0; z-index: 300;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #endCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #endingPlayAgain {
      position: relative; z-index: 2;
      margin-top: 60vh;
      padding: 14px 44px; font-size: 1.1rem; font-weight: bold;
      letter-spacing: 2px; text-transform: uppercase;
      background: #ffd700; color: #111; border: none;
      border-radius: 30px; cursor: pointer;
      box-shadow: 0 4px 20px #ffd70088;
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s, transform 0.2s;
    }
    #endingPlayAgain:hover { transform: translateY(-2px); box-shadow: 0 6px 28px #ffd700aa; }

    /* ── Language picker ── */
    #langToggle {
      position: fixed; top: 12px; right: 12px; z-index: 200;
      background: #16213e; border: 1px solid #333; color: #fff;
      font-size: 1.3rem; width: 38px; height: 38px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, box-shadow .2s;
    }
    #langToggle:hover { border-color: #e94560; box-shadow: 0 0 10px #e9456055; }
    #langPanel {
      position: fixed; top: 58px; right: 12px; z-index: 199;
      background: #16213e; border: 1px solid #333; border-radius: 12px;
      padding: 10px; display: none; flex-direction: column; gap: 8px;
      box-shadow: 0 6px 30px rgba(0,0,0,.8); min-width: 260px;
    }
    #langPanel.open { display: flex; }
    #langSearch {
      width: 100%; padding: 6px 10px; background: #0f1929; border: 1px solid #333;
      border-radius: 8px; color: #eee; font-size: .85rem; outline: none;
    }
    #langSearch:focus { border-color: #e94560; }
    #langGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; max-height: 320px; overflow-y: auto; }
    #langGrid::-webkit-scrollbar { width: 4px; }
    #langGrid::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .lang-btn {
      display: flex; align-items: center; gap: 6px; padding: 6px 8px;
      background: #0f1929; border: 1px solid #222; border-radius: 8px;
      color: #aaa; font-size: .8rem; cursor: pointer; transition: all .15s; text-align: left;
    }
    .lang-btn:hover { border-color: #e94560; color: #fff; }
    .lang-btn.active { border-color: #e94560; color: #fff; background: #1a0a10; }
    .lang-btn .flag { font-size: 1rem; }

    /* ── Start screen ── */
    #startScreen { position: fixed; inset: 0; background: #0d0d1f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; overflow: hidden; }
    .floaters { position: absolute; inset: 0; pointer-events: none; }
    .floater { position: absolute; animation: floatUp linear infinite; opacity: 0; user-select: none; }
    @keyframes floatUp { 0%{transform:translateY(110vh);opacity:0} 10%{opacity:.15} 90%{opacity:.08} 100%{transform:translateY(-10vh);opacity:0} }
    #startTitle { font-size: clamp(2.5rem,8vw,5rem); font-weight: 900; color: #e94560; text-transform: uppercase; letter-spacing: 6px; text-align: center; text-shadow: 0 0 20px #e9456066; animation: fadeGlow 3s ease-in-out infinite; position: relative; z-index: 2; line-height: 1.1; }
    @keyframes fadeGlow { 0%,100%{text-shadow:0 0 20px #e9456044} 50%{text-shadow:0 0 40px #e94560aa} }
    #startSub { margin-top: 16px; font-size: clamp(.9rem,2.5vw,1.1rem); color: #666; letter-spacing: 3px; text-transform: uppercase; position: relative; z-index: 2; }
    #startBtn { margin-top: 50px; padding: 14px 44px; font-size: 1rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; background: #e94560; color: #fff; border: none; border-radius: 30px; cursor: pointer; position: relative; z-index: 2; transition: all .2s; box-shadow: 0 4px 20px #e9456055; }
    #startBtn:hover { background: #c73652; box-shadow: 0 6px 28px #e9456088; transform: translateY(-2px); }
    #bloodDrips { display: none; }
  </style>

        levelNotes:['🚪 Виходу немає…','👁️ Тут щось є з тобою. Виходу немає.','🌑 Темрява поглинає тебе. Виходу немає.','👥 Вони скрізь. Виходу немає.','🔑 Вихід замкнений. Виходу немає.','💀 Ти ніколи не підеш. Виходу немає.','🚷 Це кінець. Справді виходу немає.'],
        diffEnemy:'ворог', diffFog:'Туман r=', diffKey:'Потрібен ключ',
      },
    };

    let currentLang = 'en';
    function t(k) { return TRANSLATIONS[currentLang][k]; }

    function setLang(code) {
      currentLang = code;
      document.getElementById('gameTitle').textContent   = t('gameTitle');
      document.getElementById('startTitle').innerHTML    = t('startTitle');
      document.getElementById('startSub').textContent    = t('startSub');
      document.getElementById('startBtn').textContent    = t('startBtn');
      document.getElementById('labelLevel').textContent  = t('labelLevel');
      document.getElementById('labelTime').textContent   = t('labelTime');
      document.getElementById('labelMoves').textContent  = t('labelMoves');
      document.getElementById('controls').textContent    = t('controls');
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === code));
      if (level) { cfg = getConfig(level); document.getElementById('levelName').textContent = cfg.name.toUpperCase(); updateKeyStatus(); buildDifficultyText(); }
    }

    // ── Language panel UI ──────────────────────────────────────────────────────
    const langGrid = document.getElementById('langGrid');
    LANGS.forEach(({ code, flag, name }) => {
      const btn = document.createElement('button');
      btn.className = 'lang-btn' + (code === 'en' ? ' active' : '');
      btn.dataset.lang = code;
      btn.innerHTML = `<span class="flag">${flag}</span>${name}`;
      btn.onclick = () => { setLang(code); closeLangPanel(); };
      langGrid.appendChild(btn);
    });

    const langToggle = document.getElementById('langToggle');
    const langPanel  = document.getElementById('langPanel');
    const langSearch = document.getElementById('langSearch');

    langToggle.addEventListener('click', e => { e.stopPropagation(); langPanel.classList.toggle('open'); if (langPanel.classList.contains('open')) { langSearch.value=''; filterLangs(''); langSearch.focus(); } });
    document.addEventListener('click', () => closeLangPanel());
    langPanel.addEventListener('click', e => e.stopPropagation());
    langSearch.addEventListener('input', e => filterLangs(e.target.value));

    function closeLangPanel() { langPanel.classList.remove('open'); }
    function filterLangs(q) {
      const query = q.toLowerCase();
      langGrid.querySelectorAll('.lang-btn').forEach(btn => {
        const match = btn.textContent.toLowerCase().includes(query) || btn.dataset.lang.includes(query);
        btn.style.display = match ? '' : 'none';
      });
    }

    // ── Level visual configs ───────────────────────────────────────────────────
    const CONFIGS = [
      { bg:'#0a0d1a', wall:'#4488ff', accent:'#4488ff', enemyCount:0, hasKey:false, fog:Infinity },
      { bg:'#0a1a0a', wall:'#44dd77', accent:'#44dd77', enemyCount:1, hasKey:false, fog:Infinity },
      { bg:'#110a1a', wall:'#aa44ff', accent:'#aa44ff', enemyCount:1, hasKey:false, fog:5 },
      { bg:'#1a0e00', wall:'#ff7722', accent:'#ff7722', enemyCount:2, hasKey:false, fog:4 },
      { bg:'#1a1800', wall:'#ffcc00', accent:'#ffcc00', enemyCount:0, hasKey:true,  fog:3 },
      { bg:'#1a0000', wall:'#ff2244', accent:'#ff2244', enemyCount:3, hasKey:true,  fog:2 },
      { bg:'#05050f', wall:'#ffffff', accent:'#ffffff', enemyCount:4, hasKey:true,  fog:2 },
    ];
    const MAX_LEVEL = 7;
    function getConfig(lvl) {
      const idx = Math.min(lvl-1, CONFIGS.length-1);
      const cfg = { ...CONFIGS[idx] };
      const ni  = Math.min(lvl-1, t('levelNames').length-1);
      cfg.name  = t('levelNames')[ni];
      cfg.note  = t('levelNotes')[ni];
      if (lvl > CONFIGS.length) cfg.enemyCount = Math.min(4, CONFIGS[CONFIGS.length-1].enemyCount + (lvl-CONFIGS.length));
      return cfg;
    }
    function getMazeSize(lvl)   { return Math.min(11+(lvl-1)*2, 31); }
    function getEnemySpeed(lvl) { return Math.max(200, 900-(lvl-2)*80); }
    function getChaseRadius(lvl){ return 6+(lvl-2)*2; }

    // ── State ──────────────────────────────────────────────────────────────────
    let CELL, COLS, ROWS, grid, player, enemies, keyItem;
    let level, cfg, moveCount, startTime, timerInterval, enemyInterval;
    let gameActive = false;

    function cellAt(r,c){ if(r<0||c<0||r>=ROWS||c>=COLS) return null; return grid[r*COLS+c]; }
    function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

    function generateMaze(r,c){ cellAt(r,c).visited=true; for(let d of shuffle([0,1,2,3])){const nr=r+DR[d],nc=c+DC[d],nb=cellAt(nr,nc);if(nb&&!nb.visited){cellAt(r,c).walls[d]=false;nb.walls[(d+2)%4]=false;generateMaze(nr,nc);}} }
    function addLoops(n){ let rem=0; for(let i=0;i<n*20&&rem<n;i++){const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS),dir=Math.random()<.5?1:2,nr=r+DR[dir],nc=c+DC[dir],cell=cellAt(r,c),nb=cellAt(nr,nc);if(nb&&cell.walls[dir]){cell.walls[dir]=false;nb.walls[(dir+2)%4]=false;rem++;}} }

    function bfsNextDir(fr,fc,tr,tc){
      if(fr===tr&&fc===tc) return null;
      const vis=new Uint8Array(ROWS*COLS),q=[];vis[fr*COLS+fc]=1;
      for(let d=0;d<4;d++){if(!cellAt(fr,fc).walls[d]){const nr=fr+DR[d],nc=fc+DC[d],i=nr*COLS+nc;if(!vis[i]){vis[i]=1;q.push({r:nr,c:nc,dir:d});}}}
      let qi=0;while(qi<q.length){const{r,c,dir}=q[qi++];if(r===tr&&c===tc) return dir;for(let d=0;d<4;d++){if(!cellAt(r,c).walls[d]){const nr=r+DR[d],nc=c+DC[d],i=nr*COLS+nc;if(!vis[i]){vis[i]=1;q.push({r:nr,c:nc,dir});}}}}
      return null;
    }

    function initLevel(lvl){
      level=lvl; cfg=getConfig(lvl); gameActive=false;
      clearInterval(timerInterval); clearInterval(enemyInterval);
      const size=getMazeSize(lvl); COLS=size; ROWS=size;
      CELL=Math.max(12,Math.min(30,Math.floor(window.innerWidth*.93/size),Math.floor(window.innerHeight*.72/size)));
      canvas.width=COLS*CELL; canvas.height=ROWS*CELL;
      canvas.style.borderColor=cfg.accent; canvas.style.boxShadow=`0 0 30px ${cfg.accent}55`;
      document.body.style.background=cfg.bg;
      grid=Array.from({length:ROWS*COLS},(_,i)=>({r:Math.floor(i/COLS),c:i%COLS,visited:false,walls:[true,true,true,true]}));
      generateMaze(0,0); addLoops(Math.floor(COLS*ROWS*.08));
      player={r:0,c:0};
      const sp=[[ROWS-1,0],[0,COLS-1],[ROWS-1,COLS-2],[1,COLS-1]];
      enemies=Array.from({length:cfg.enemyCount},(_,i)=>({r:sp[i%sp.length][0],c:sp[i%sp.length][1],chasing:false}));
      keyItem=cfg.hasKey?{r:Math.floor(ROWS/2),c:Math.floor(COLS/2),collected:false}:null;
      moveCount=0; startTime=Date.now();
      document.getElementById('moves').textContent=0;
      document.getElementById('levelDisplay').textContent=lvl;
      document.getElementById('levelName').textContent=cfg.name.toUpperCase();
      updateKeyStatus(); buildDifficultyText();
      timerInterval=setInterval(()=>{ if(gameActive) document.getElementById('timer').textContent=Math.floor((Date.now()-startTime)/1000)+'s'; },500);
      if(cfg.enemyCount>0) enemyInterval=setInterval(stepAllEnemies,getEnemySpeed(lvl));
      gameActive=true; draw();
    }

    function buildDifficultyText(){
      const p=[`${getMazeSize(level)}×${getMazeSize(level)}`];
      if(cfg.enemyCount>0) p.push(`<span style="color:#ff5555">${cfg.enemyCount} ${t('diffEnemy')}</span>`);
      if(cfg.fog!==Infinity) p.push(`<span style="color:#ffbb33">${t('diffFog')}${cfg.fog}</span>`);
      if(cfg.hasKey) p.push(`<span style="color:#ffcc00">${t('diffKey')}</span>`);
      document.getElementById('difficulty').innerHTML=p.join(' | ');
    }
    function updateKeyStatus(){
      const el=document.getElementById('keyStatus');
      if(!cfg||!cfg.hasKey){el.style.display='none';return;}
      el.style.display='block';
      document.getElementById('keyText').textContent=keyItem&&keyItem.collected?t('keyGot'):t('keyFind');
    }

    function stepAllEnemies(){
      if(!gameActive) return;
      for(const e of enemies){
        const dist=Math.sqrt((e.r-player.r)**2+(e.c-player.c)**2);
        let dir;
        if(dist<=getChaseRadius(level)){e.chasing=true;dir=bfsNextDir(e.r,e.c,player.r,player.c);}
        else{e.chasing=false;const v=[0,1,2,3].filter(d=>!cellAt(e.r,e.c).walls[d]);dir=v[Math.floor(Math.random()*v.length)];}
        if(dir!=null){e.r+=DR[dir];e.c+=DC[dir];}
        if(e.r===player.r&&e.c===player.c){draw();triggerGameOver();return;}
      }
      draw();
    }

    function movePlayer(dr,dc){
      if(!gameActive) return;
      const d=DR.findIndex((r,i)=>r===dr&&DC[i]===dc);
      if(cellAt(player.r,player.c).walls[d]) return;
      player.r+=dr; player.c+=dc; moveCount++;
      document.getElementById('moves').textContent=moveCount;
      if(keyItem&&!keyItem.collected&&player.r===keyItem.r&&player.c===keyItem.c){keyItem.collected=true;updateKeyStatus();notify(t('keyNotify'));}
      draw();
      if(enemies.some(e=>e.r===player.r&&e.c===player.c)){triggerGameOver();return;}
      if((!cfg.hasKey||keyItem.collected)&&player.r===ROWS-1&&player.c===COLS-1) triggerWin();
    }

    // ── Ending animation ───────────────────────────────────────────────────────
    function showEnding() {
      const screen = document.getElementById('endingScreen');
      screen.style.display = 'flex';
      const ec = document.getElementById('endCanvas');
      const ex = ec.getContext('2d');
      ec.width  = window.innerWidth;
      ec.height = window.innerHeight;

      const W = ec.width, H = ec.height;
      const CY = H * 0.55;
      const R  = Math.min(W, H) * 0.07;   // player/enemy radius
      const KR = R * 1.5;                  // king radius
      const playerX = W * 0.35;
      const kingStartX = W + KR + 20;
      const kingEndX   = W * 0.62;

      const particles = [];
      function spawnParticles() {
        for (let i = 0; i < 80; i++) {
          particles.push({
            x: playerX, y: CY - R,
            vx: (Math.random() - 0.5) * 8,
            vy: -(Math.random() * 6 + 2),
            size: Math.random() * 8 + 4,
            color: ['#ffd700','#fff','#e94560','#00d4ff','#ff9500'][Math.floor(Math.random()*5)],
            life: 1
          });
        }
      }

      let startT = null;
      const T1 = 2200;  // king finishes walking
      const T2 = 3200;  // king bows / pause
      const T3 = 4400;  // crown lands on player
      const T4 = 5200;  // text fully visible
      const T5 = 5800;  // particles burst
      let particlesSpawned = false;

      function drawEye(ctx, x, y, r) {
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle='white'; ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, r*0.55, 0, Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
      }

      function easeOut(t) { return 1 - Math.pow(1-t, 3); }
      function lerp(a, b, t) { return a + (b-a)*t; }

      function frame(ts) {
        if (!startT) startT = ts;
        const e = ts - startT;

        // Background gradient — throne room
        const bg = ex.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#0a0010'); bg.addColorStop(1, '#1a0d00');
        ex.fillStyle = bg; ex.fillRect(0, 0, W, H);

        // Floor
        ex.fillStyle = '#1a1208';
        ex.fillRect(0, CY + R + 12, W, H);
        ex.strokeStyle = '#ffd70033'; ex.lineWidth = 2;
        ex.beginPath(); ex.moveTo(0, CY+R+12); ex.lineTo(W, CY+R+12); ex.stroke();

        // Spotlight on player
        const sp = ex.createRadialGradient(playerX, CY, 0, playerX, CY, R*5);
        sp.addColorStop(0, 'rgba(255,215,0,0.12)'); sp.addColorStop(1, 'rgba(0,0,0,0)');
        ex.fillStyle = sp; ex.fillRect(0, 0, W, H);

        // ── King position ──
        let kingX;
        if (e < T1) kingX = lerp(kingStartX, kingEndX, easeOut(e/T1));
        else        kingX = kingEndX;

        // King bow offset (dips down slightly during bow phase)
        let bowY = 0;
        if (e > T1 && e < T2) bowY = Math.sin(((e-T1)/(T2-T1))*Math.PI) * R * 0.4;

        // ── Crown position ──
        let crownX, crownY;
        if (e < T2) {
          crownX = kingX; crownY = CY - KR - R*0.6 + bowY;
        } else if (e < T3) {
          const t = easeOut((e-T2)/(T3-T2));
          crownX = lerp(kingX, playerX, t);
          crownY = lerp(CY - KR - R*0.6, CY - R - R*0.55, t) - Math.sin(t*Math.PI)*R*2.5;
        } else {
          crownX = playerX; crownY = CY - R - R*0.55;
        }

        // ── Draw player ──
        ex.beginPath(); ex.arc(playerX, CY, R, 0, Math.PI*2);
        ex.fillStyle = '#00d4ff'; ex.shadowColor='#00d4ff'; ex.shadowBlur=20; ex.fill(); ex.shadowBlur=0;
        drawEye(ex, playerX-R*0.28, CY-R*0.2, R*0.18);
        drawEye(ex, playerX+R*0.28, CY-R*0.2, R*0.18);

        // ── Draw king ──
        ex.beginPath(); ex.arc(kingX, CY + bowY, KR, 0, Math.PI*2);
        ex.fillStyle='#cc2200'; ex.shadowColor='#ff4400'; ex.shadowBlur=24; ex.fill(); ex.shadowBlur=0;
        // King cape/robe hint
        ex.beginPath(); ex.ellipse(kingX, CY+bowY+KR*0.6, KR*0.8, KR*0.4, 0, 0, Math.PI);
        ex.fillStyle='#880000'; ex.fill();
        // King eyes
        drawEye(ex, kingX-KR*0.25, CY+bowY-KR*0.15, KR*0.15);
        drawEye(ex, kingX+KR*0.25, CY+bowY-KR*0.15, KR*0.15);

        // ── Speech bubble from king ──
        if (e > T3) {
          const bubbleAlpha = Math.min(1, (e-T3)/500);
          ex.globalAlpha = bubbleAlpha;
          const bx = kingX - KR*0.5, by = CY - KR*2.6;
          const bw = R*6.5, bh = R*1.6;
          ex.fillStyle='#fff'; ex.beginPath();
          ex.roundRect(bx - bw/2, by - bh/2, bw, bh, 12); ex.fill();
          // tail
          ex.beginPath(); ex.moveTo(bx-10, by+bh/2); ex.lineTo(kingX-KR*0.2, CY-KR); ex.lineTo(bx+10, by+bh/2); ex.fill();
          ex.fillStyle='#111'; ex.font=`bold ${R*0.58}px Segoe UI`;
          ex.textAlign='center'; ex.textBaseline='middle';
          ex.fillText('You are the king now', bx, by);
          ex.globalAlpha = 1;
        }

        // ── Crown emoji ──
        ex.font = `${R*1.1}px serif`;
        ex.textAlign='center'; ex.textBaseline='middle';
        ex.shadowColor='#ffd700'; ex.shadowBlur=16;
        ex.fillText('👑', crownX, crownY);
        ex.shadowBlur=0;

        // ── Particles ──
        if (e > T5 && !particlesSpawned) { spawnParticles(); particlesSpawned=true; }
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= 0.012;
          ex.globalAlpha = Math.max(0, p.life);
          ex.fillStyle = p.color;
          ex.beginPath(); ex.arc(p.x, p.y, p.size, 0, Math.PI*2); ex.fill();
        }
        ex.globalAlpha = 1;

        // ── "Play Again" button ──
        if (e > T4 + 800) {
          const btn = document.getElementById('endingPlayAgain');
          btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
        }

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);

      document.getElementById('endingPlayAgain').onclick = () => {
        document.getElementById('endingScreen').style.display = 'none';
        document.getElementById('endingPlayAgain').style.opacity = '0';
        document.getElementById('endingPlayAgain').style.pointerEvents = 'none';
        particles.length = 0;
        initLevel(1); notify(getConfig(1).note);
      };
    }

    function triggerWin(){
      gameActive=false; clearInterval(timerInterval); clearInterval(enemyInterval);
      if (level === MAX_LEVEL) {
        showEnding();
      } else {
        const nextLvl=level+1;
        const taunts=t('taunts'), taunt=taunts[Math.min(level-1,taunts.length-1)];
        showOverlay(t('winTitle'),taunt,t('nextBtn'),()=>{hideOverlay();initLevel(nextLvl);notify(getConfig(nextLvl).note);});
      }
    }
    function triggerGameOver(){
      gameActive=false; clearInterval(timerInterval); clearInterval(enemyInterval);
      showOverlay(t('caughtTitle'),t('caughtMsg')(cfg.name),t('retryBtn'),()=>{hideOverlay();initLevel(level);});
    }
    function showOverlay(title,msg,btnText,cb){
      document.getElementById('overlayTitle').textContent=title;
      document.getElementById('overlayMsg').textContent=msg;
      const btn=document.getElementById('overlayBtn');btn.textContent=btnText;btn.onclick=cb;
      document.getElementById('overlay').style.display='flex';
    }
    function hideOverlay(){ document.getElementById('overlay').style.display='none'; }
    function notify(msg){ const el=document.getElementById('notification');el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',2800); }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle=cfg.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle=cfg.wall;ctx.lineWidth=2;
      for(const cell of grid){const x=cell.c*CELL,y=cell.r*CELL;if(cell.walls[0])line(x,y,x+CELL,y);if(cell.walls[1])line(x+CELL,y,x+CELL,y+CELL);if(cell.walls[2])line(x,y+CELL,x+CELL,y+CELL);if(cell.walls[3])line(x,y,x,y+CELL);}
      if(keyItem&&!keyItem.collected){const kx=keyItem.c*CELL+CELL/2,ky=keyItem.r*CELL+CELL/2;ctx.font=`${CELL-6}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#ffcc00';ctx.shadowBlur=12;ctx.fillText('🔑',kx,ky);ctx.shadowBlur=0;}
      const exitOpen=!cfg.hasKey||(keyItem&&keyItem.collected);
      ctx.font=`${CELL-4}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=exitOpen?cfg.accent:'#555';ctx.shadowColor=exitOpen?cfg.accent:'transparent';ctx.shadowBlur=exitOpen?14:0;
      ctx.fillText('★',(COLS-1)*CELL+CELL/2,(ROWS-1)*CELL+CELL/2);ctx.shadowBlur=0;
      for(const e of enemies){const ex=e.c*CELL+CELL/2,ey=e.r*CELL+CELL/2;ctx.beginPath();ctx.arc(ex,ey,CELL/2-3,0,Math.PI*2);ctx.fillStyle=e.chasing?'#ff1111':'#882222';ctx.shadowColor=e.chasing?'#ff0000':'#440000';ctx.shadowBlur=e.chasing?20:5;ctx.fill();ctx.shadowBlur=0;if(CELL>=16){const er=CELL/10;for(const ox of[-CELL/7,CELL/7]){ctx.beginPath();ctx.arc(ex+ox,ey-CELL/9,er+1,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.beginPath();ctx.arc(ex+ox,ey-CELL/9,er*.55,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();}}}
      if(cfg.fog!==Infinity){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const dist=Math.sqrt((r-player.r)**2+(c-player.c)**2);let a=0;if(dist>cfg.fog)a=.94;else if(dist>cfg.fog-1.5)a=((dist-(cfg.fog-1.5))/1.5)*.94;if(a>0){ctx.fillStyle=`rgba(5,5,10,${a.toFixed(2)})`;ctx.fillRect(c*CELL,r*CELL,CELL,CELL);}}}
      const px=player.c*CELL+CELL/2,py=player.r*CELL+CELL/2;
      ctx.beginPath();ctx.arc(px,py,CELL/2-4,0,Math.PI*2);ctx.fillStyle='#00d4ff';ctx.shadowColor='#00d4ff';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
    }
    function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}

    document.addEventListener('keydown',e=>{const map={ArrowUp:[-1,0],w:[-1,0],W:[-1,0],ArrowDown:[1,0],s:[1,0],S:[1,0],ArrowLeft:[0,-1],a:[0,-1],A:[0,-1],ArrowRight:[0,1],d:[0,1],D:[0,1]};if(map[e.key]){movePlayer(...map[e.key]);e.preventDefault();}});
    let tx,ty;
    canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
    canvas.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy))movePlayer(0,dx>0?1:-1);else movePlayer(dy>0?1:-1,0);e.preventDefault();},{passive:false});

    // ── Start screen ───────────────────────────────────────────────────────────
    const dripsEl=document.getElementById('bloodDrips');
    for(let i=0;i<20;i++){const d=document.createElement('div');d.className='drip';d.style.animationDuration=`${1.5+Math.random()*3}s`;d.style.animationDelay=`${Math.random()*4}s`;d.style.width=`${4+Math.random()*6}px`;d.style.marginLeft=`${Math.random()*10}px`;dripsEl.appendChild(d);}

    document.getElementById('startBtn').addEventListener('click',()=>{
      document.getElementById('startScreen').style.display='none';
      initLevel(1); notify(getConfig(1).note);
    });
  </script>
</body>
</html>
